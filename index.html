<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chowdeck</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="logo.svg">
    <link
    rel="stylesheet"

<body class="body">

        <button><img src="logo.svg"></button>

           <h2>NG<i class="fa-solid fa-circle-chevron-down"></i></h2>

    </div>
  
            <div class="header-link">
            <ul>
                <li><a href="#Company">Company</a></li>
                <li><a href="#Riders">Riders</a></li>
                <li><a href="#Vendors">Vendors</a></li>
                <li><a href="#Product">Product <i class="fa-solid fa-circle-chevron-down"></i></a></li>
            </ul>
        </div>
            <div class="header-link-secd">
        <button>
           <h2>More<i class="fa-solid fa-circle-chevron-down"></i></h2> 
        </button>
    </div>

    <div class="basket">
        <button><i class="fa-solid fa-cart-arrow-down"></i></button>
    </div>
        
          </div>
